<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Viaggi in offerta — SmartTour</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/components.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a class="brand" href="/" aria-label="Torna alla homepage">
        <span class="brand-mark">ST</span>
        <div class="brand-copy">
          <span class="brand-name">SmartTour</span>
        </div>
      </a>
    </div>
  </header>

  <main class="main">
    <section class="offers-section offers-section--page" aria-label="Offerte speciali">
      <div class="section-head">
        <div>
          <h1>Viaggi in offerta</h1>
          <p>Le offerte cambiano ogni 24 ore e possono essere prenotate direttamente dal tuo account.</p>
        </div>
      </div>
      <div class="offers-list" id="offersList" aria-live="polite"></div>
    </section>

    <section class="account-panel" id="accountPanel" aria-label="Account"></section>
  </main>

  <script src="/javascript/config.js" defer></script>
  <script src="/javascript/security.js" defer></script>
  <script src="/javascript/app.js" defer></script>
  <script src="/javascript/main.js" defer></script>

</body>
</html>
